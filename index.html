<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIKIDS - ប្រកួតអំណាន ភាសាខ្មែរ ២០២៥-២០២៦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Khmer:wght@400;500;600;700&family=Moul&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Serif Khmer','Khmer OS Battambang',serif;
  background: #eef2f8;
  min-height: 100vh;
}

.app-header {
  background: linear-gradient(135deg, #1a3a6b 0%, #2563b0 100%);
  color: white; text-align: center;
  padding: 18px 20px 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
}
.app-header h1 { font-size: 20px; font-weight: bold; line-height: 1.4; }
.app-header p  { font-size: 13px; opacity: 0.85; margin-top: 4px; }

.page-nav {
  background: #1a3a6b; display: flex;
  border-bottom: 3px solid #f6c23e;
  flex-wrap: wrap;
}
.page-nav button {
  padding: 11px 18px; border: none;
  background: transparent; color: rgba(255,255,255,0.7);
  font-family: inherit; font-size: 13px; font-weight: bold;
  cursor: pointer; transition: all 0.2s;
  border-bottom: 3px solid transparent; margin-bottom: -3px;
}
.page-nav button:hover { color: white; background: rgba(255,255,255,0.1); }
.page-nav button.active { color: #f6c23e; border-bottom-color: #f6c23e; background: rgba(255,255,255,0.08); }

.judge-bar {
  background: white; border-bottom: 3px solid #2563b0;
  padding: 10px 16px; display: flex; align-items: center;
  gap: 12px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.judge-bar label { font-size: 14px; font-weight: bold; color: #1a3a6b; white-space: nowrap; }
.judge-bar select, .ctrl-select {
  padding: 7px 12px; border: 2px solid #2563b0;
  border-radius: 8px; font-family: inherit;
  font-size: 14px; color: #1a3a6b;
  background: #f0f6ff; cursor: pointer;
}

.class-tabs {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 10px 16px; background: #e8eef7;
  border-bottom: 2px solid #c5d5ea;
}
.class-tab {
  padding: 7px 14px; border: 2px solid #2563b0;
  border-radius: 20px; background: white; color: #2563b0;
  font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.class-tab:hover { background: #dce9ff; }
.class-tab.active { background: #2563b0; color: white; }

.res-grade-tabs {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 0 0 12px 0;
}
.res-grade-tab {
  padding: 8px 16px; border: 2px solid #2563b0;
  border-radius: 20px; background: white; color: #2563b0;
  font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.2s;
  font-weight: bold;
}
.res-grade-tab:hover { background: #dce9ff; }
.res-grade-tab.active { background: #2563b0; color: white; }

.content { padding: 12px; }
.page { display: none; }
.page.active { display: block; }

.table-card {
  background: white; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  overflow: hidden; margin-bottom: 16px;
}
.table-title {
  background: linear-gradient(135deg, #1a3a6b, #2563b0);
  color: white; padding: 12px 16px; font-size: 15px; font-weight: bold;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.score-table-wrap { overflow-x: auto; }
.score-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px; min-width: 750px;
}
.score-table th {
  background: #1a3a6b; color: white;
  padding: 9px 6px; text-align: center;
  font-size: 12px; border: 1px solid #0f2547; line-height: 1.4;
}
.score-table td {
  padding: 6px 5px; border: 1px solid #d0d7e3;
  text-align: center; vertical-align: middle;
}
.score-table tr:nth-child(even) td { background: #f5f8ff; }
.score-table tr:hover td { background: #e8f0ff; }
.col-no   { width: 38px; font-weight: bold; color: #2563b0; }
.col-name { text-align: left !important; padding-left: 10px !important; min-width: 140px; font-weight: 600; color: #1a3a6b; }
.col-sex  { width: 38px; }
.col-grade{ width: 65px; font-size: 12px; }
.col-code { width: 65px; font-size: 12px; color: #555; }

.score-input {
  width: 52px; padding: 5px 3px;
  border: 1.5px solid #b0c0dd; border-radius: 6px;
  text-align: center; font-family: inherit; font-size: 13px;
  background: #fff; transition: border-color 0.2s, background 0.2s;
}
.score-input:focus  { outline: none; border-color: #2563b0; background: #f0f6ff; }
.score-input.over   { border-color: #e53e3e; background: #fff5f5; }
.score-input.filled { border-color: #38a169; background: #f0fff4; }

.total-cell { font-weight: bold; font-size: 15px; min-width: 48px; }
.total-cell.good  { color: #38a169; }
.total-cell.avg   { color: #d97706; }
.total-cell.low   { color: #e53e3e; }
.total-cell.empty { color: #aaa; }

.btn {
  padding: 9px 18px; border: none; border-radius: 8px; color: white;
  font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.btn-save   { background: #2563b0; }
.btn-export { background: #1a7a4a; }
.btn-clear  { background: #9b2c2c; }
.btn-pdf    { background: #c05621; font-size: 15px; padding: 11px 26px; }

.action-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 12px 16px; background: #f0f4fa;
  border-top: 2px solid #e2e8f0;
}

.save-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #aaa; margin-right: 6px; }
.save-dot.saved { background: #38a169; }
.save-status { font-size: 12px; color: #555; display: flex; align-items: center; }

.summary-panel { background: white; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 16px; margin-bottom: 16px; }
.summary-panel h3 { color: #1a3a6b; font-size: 16px; border-bottom: 2px solid #2563b0; padding-bottom: 8px; margin-bottom: 12px; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
.summary-box { background: #f0f6ff; border: 2px solid #c5d5ea; border-radius: 8px; padding: 10px; text-align: center; }
.summary-box .s-label { font-size: 12px; color: #555; margin-bottom: 4px; }
.summary-box .s-val   { font-size: 22px; font-weight: bold; color: #1a3a6b; }

.leaderboard { background: white; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 16px; margin-bottom: 16px; }
.leaderboard h3 { color: #1a3a6b; font-size: 16px; border-bottom: 2px solid #f6c23e; padding-bottom: 8px; margin-bottom: 12px; }
.lb-row { display: flex; align-items: center; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; gap: 10px; }
.lb-row:nth-child(1) { background: #fffbea; border: 2px solid #f6c23e; }
.lb-row:nth-child(2) { background: #f8f8f8; border: 2px solid #cbd5e0; }
.lb-row:nth-child(3) { background: #fff5ee; border: 2px solid #ed8936; }
.lb-row:nth-child(n+4) { background: #f9fafb; border: 1px solid #e2e8f0; }
.lb-rank  { font-size: 20px; width: 32px; text-align: center; }
.lb-name  { flex: 1; font-weight: bold; font-size: 14px; color: #1a3a6b; }
.lb-class { font-size: 12px; color: #666; }
.lb-score { font-size: 18px; font-weight: bold; color: #2563b0; }

.results-controls-bar {
  background: white; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  padding: 14px 16px; margin-bottom: 14px;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.results-controls-bar label { font-weight: bold; color: #1a3a6b; font-size: 14px; }

.report-wrap {
  background: white; border-radius: 10px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.12);
  padding: 24px 28px; margin-bottom: 16px;
  max-width: 1000px; margin-left: auto; margin-right: auto;
}
.rpt-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.rpt-logo-box { display: flex; align-items: center; gap: 12px; }
.rpt-logo-circle { width: 82px; height: 82px; object-fit: contain; flex-shrink: 0; }
.rpt-school .km { font-family: 'Moul', 'Khmer OS Muol Light', serif; font-size: 14px; font-weight: 400; color: #c8102e; line-height: 1.5; }
.rpt-school .en { font-size: 10px; color: #888; font-family: Arial,sans-serif; letter-spacing: 1px; }
.rpt-right { text-align: right; font-size: 13px; line-height: 2.2; color: #222; }
.rpt-right p {
  font-family: 'Moul', 'Khmer OS Muol Light', serif;
  font-size: 12px; font-weight: 400;
  color: transparent;
  background: linear-gradient(180deg, #2a2a2a 0%, #000 50%, #3a3a3a 100%);
  -webkit-background-clip: text; background-clip: text;
  filter: drop-shadow(0 1px 0 rgba(255,255,255,0.8)) drop-shadow(0 -1px 0 rgba(0,0,0,0.25));
  line-height: 1.8;
}
.rpt-right .stars { font-size: 18px; color: #c8102e; letter-spacing: 6px; }
.rpt-title-box {
  border-top: 2.5px solid #1a3a6b; border-bottom: 2.5px solid #1a3a6b;
  padding: 12px 0 10px; text-align: center; margin: 12px 0;
  background: linear-gradient(180deg, #f0f4ff 0%, #fff 50%, #f0f4ff 100%);
  position: relative;
}
.rpt-title-box::before, .rpt-title-box::after {
  content: '◆';
  position: absolute; top: 50%; transform: translateY(-50%);
  color: #C9A84C; font-size: 10px;
}
.rpt-title-box::before { left: 12px; }
.rpt-title-box::after  { right: 12px; }
.rpt-title-box h2 {
  font-family: 'Moul', 'Khmer OS Muol Light', serif;
  font-size: 18px; font-weight: 400;
  color: transparent;
  background: linear-gradient(180deg, #2a5298 0%, #0f2547 40%, #2a5298 100%);
  -webkit-background-clip: text; background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 1px 0 rgba(255,255,255,0.8)) drop-shadow(0 -1px 0 rgba(0,0,0,0.2));
  letter-spacing: 0.5px; line-height: 1.4;
}
.rpt-title-box p  { font-size: 12.5px; color: #555; margin-top: 5px; }
.rpt-stats {
  background: #f5f8ff; border: 1px solid #c5d5ea;
  border-radius: 6px; padding: 9px 14px;
  font-size: 13px; color: #333; line-height: 1.9;
  margin-bottom: 12px;
}

.rpt-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 14px; }
.rpt-table th {
  background: #1a3a6b; color: white;
  padding: 8px 5px; text-align: center;
  border: 1px solid #0f2547; font-size: 11.5px; line-height: 1.35;
}
.rpt-table td { padding: 6px 5px; border: 1px solid #bbb; text-align: center; vertical-align: middle; }
.rpt-table tr:nth-child(even) td { background: #f5f8ff; }
.rpt-table td.name-col { text-align: left; padding-left: 8px; font-weight: 600; color: #1a3a6b; min-width: 120px; }

.rank-circle {
  display: inline-block; width: 26px; height: 26px; border-radius: 50%;
  line-height: 26px; text-align: center;
  font-weight: bold; font-size: 12px; color: white;
}
.rank-1 { background: #d4a017; }
.rank-2 { background: #9e9e9e; }
.rank-3 { background: #cd7f32; }
.rank-n { background: #1a3a6b; }
.rank-none { color: #aaa; font-size: 12px; }

.nittoes { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
.nit-excellent { background: #c6f6d5; color: #22543d; }
.nit-good      { background: #bee3f8; color: #2a4e7a; }
.nit-average   { background: #fefcbf; color: #7b4f12; }
.nit-fail      { background: #fed7d7; color: #822727; }
.nit-none      { background: #eee; color: #888; }

.rpt-footer { margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px; font-size: 12px; color: #444; }
.rpt-legend { margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 10px; }
.rpt-sigs { display: flex; justify-content: space-between; margin-top: 30px; font-size: 13px; font-weight: bold; color: #1a3a6b; }
.rpt-sigs .sig-block { text-align: center; }
.rpt-sigs .sig-block .sub { font-weight: normal; font-size: 12px; color: #777; margin-top: 3px; }

.pdf-bar { text-align: center; padding: 14px 0 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: #1a3a6b; color: white;
  padding: 12px 20px; border-radius: 10px;
  font-size: 14px; z-index: 9999;
  opacity: 0; transform: translateY(20px);
  transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap');

:root {
  --gold:       #C9A84C;
  --gold-light: #E8C96A;
  --gold-pale:  #F5E9C8;
  --navy:       #0B1F45;
  --navy-mid:   #163260;
  --ink:        #1a2a4a;
  --cream:      #FDFAF3;
  --parchment:  #F7F2E6;
}

.cert-filter-bar {
  background: white; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.cert-filter-bar label { font-weight: bold; color: #1a3a6b; font-size: 14px; }

.cert-area-wrap { max-width: 1040px; margin: 0 auto; }

.cert-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
  gap: 32px; max-width: 1040px; margin: 0 auto 28px;
}

.certificate {
  position: relative;
  background: var(--cream);
  font-family: 'Noto Serif Khmer','Khmer OS Battambang',serif;
  box-shadow:
    0 2px 0 #8a6a20,
    0 12px 50px rgba(11,31,69,0.22),
    0 4px 16px rgba(11,31,69,0.12);
  overflow: visible;
}

.cert-border-outer {
  position: absolute; inset: -2px;
  border: 2px solid var(--gold);
  pointer-events: none; z-index: 20;
}
.cert-border-inner {
  position: absolute; inset: 5px;
  border: 1px solid rgba(201,168,76,0.4);
  pointer-events: none; z-index: 20;
}
.cert-border-inner::before,
.cert-border-inner::after {
  content: '◆';
  position: absolute; color: var(--gold);
  font-size: 8px; line-height: 1;
}
.cert-border-inner::before { top: -6px; left: 50%; transform: translateX(-50%); }
.cert-border-inner::after  { bottom: -6px; left: 50%; transform: translateX(-50%); }

.cert-ribbon {
  position: relative;
  background: var(--navy);
  padding: 0;
  overflow: hidden;
  min-height: 110px;
  display: flex; flex-direction: column;
}
.cert-ribbon::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, transparent 1px, transparent 12px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, transparent 1px, transparent 12px);
  z-index: 0;
}
.cert-ribbon-top-stripe {
  height: 5px;
  background: linear-gradient(90deg, var(--navy), var(--gold), var(--gold-light), var(--gold), var(--navy));
  flex-shrink: 0;
}
.cert-ribbon-content {
  position: relative; z-index: 2;
  display: flex; align-items: center;
  justify-content: center; gap: 14px;
  padding: 16px 28px 14px; flex: 1;
}
.cert-ribbon-logo {
  width: 58px; height: 58px; object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)) brightness(1.05);
  flex-shrink: 0;
}
.cert-ribbon-text { text-align: left; }
.cert-ribbon-km {
  font-family: 'Moul', 'Khmer OS Muol Light', serif;
  font-size: 13px; font-weight: 400; color: #fff;
  line-height: 1.4;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.cert-ribbon-en {
  font-family: 'Cinzel', 'Georgia', serif;
  font-size: 8.5px; letter-spacing: 2.5px;
  color: var(--gold-light); text-transform: uppercase;
  margin-top: 3px; opacity: 0.9;
}
.cert-ribbon-bottom {
  height: 4px; flex-shrink: 0;
  background: linear-gradient(90deg, var(--navy), var(--gold-light), var(--gold), var(--gold-light), var(--navy));
}

.cert-medal-badge {
  display: flex; flex-direction: column;
  align-items: center; margin: -10px 0 0;
  position: relative; z-index: 5;
}
.cert-medal-circle {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; line-height: 1;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 3px var(--cream), 0 0 0 5px var(--gold);
  background: var(--cream);
}
.cert-medal-ribbon-bar {
  width: 3px; height: 16px;
  background: linear-gradient(180deg, var(--gold), var(--gold-pale));
  margin-bottom: 0;
}

.cert-body {
  position: relative; z-index: 2;
  padding: 10px 36px 24px;
  text-align: center;
  background: linear-gradient(180deg, var(--cream) 0%, #fff 55%, var(--parchment) 100%);
}
.cert-seal {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 180px; height: 180px;
  border-radius: 50%;
  border: 12px double rgba(201,168,76,0.07);
  pointer-events: none; z-index: 0;
}
.cert-seal::before {
  content: 'MIKIDS';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-family: 'Cinzel', serif;
  font-size: 20px; font-weight: 700;
  color: rgba(11,31,69,0.04); letter-spacing: 4px;
  white-space: nowrap;
}

.cert-rank-label {
  display: inline-block;
  font-family: 'Cinzel', 'Georgia', serif;
  font-size: 10px; letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
  position: relative;
}
.cert-rank-label::before,
.cert-rank-label::after {
  content: '— ';
  opacity: 0.6;
}

.cert-title-km {
  font-family: 'Moul', 'Khmer OS Muol Light', serif;
  font-size: 24px; font-weight: 400;
  color: transparent;
  background: linear-gradient(180deg, #2a5298 0%, var(--navy) 50%, #2a5298 100%);
  -webkit-background-clip: text; background-clip: text;
  filter: drop-shadow(0 1px 0 rgba(255,255,255,0.9)) drop-shadow(0 -1px 0 rgba(0,0,0,0.15));
  margin: 0 0 2px; line-height: 1.4;
  letter-spacing: 0.5px;
}
.cert-title-en {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 9px; color: #8a7560;
  letter-spacing: 4px; text-transform: uppercase;
  margin-bottom: 10px; opacity: 0.9;
}

.cert-ornament {
  display: flex; align-items: center;
  gap: 8px; margin: 6px auto 10px;
  justify-content: center;
}
.cert-ornament-line {
  height: 1px; flex: 1; max-width: 70px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.cert-ornament-line.r {
  background: linear-gradient(90deg, var(--gold), transparent);
}
.cert-ornament-gem { font-size: 12px; color: var(--gold); }

.cert-event-tag {
  display: inline-block;
  background: var(--navy);
  color: var(--gold-pale);
  font-size: 10.5px; padding: 4px 16px;
  letter-spacing: 0.5px; margin-bottom: 12px;
}

.cert-presents {
  font-size: 11.5px; color: #a09070;
  margin-bottom: 3px; font-style: italic;
}

.cert-name {
  font-family: 'Moul', 'Khmer OS Muol Light', serif;
  font-size: 20px; font-weight: 400;
  color: var(--navy);
  margin: 2px 0 4px; line-height: 1.5;
  position: relative; display: inline-block;
  filter: drop-shadow(0 1px 0 rgba(255,255,255,0.9)) drop-shadow(0 -1px 0 rgba(0,0,0,0.1));
}
.cert-name-underline {
  height: 2px; margin: 0 auto 10px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  max-width: 280px;
}

.cert-meta {
  font-size: 11px; color: #a0907a;
  margin-bottom: 12px; letter-spacing: 0.5px;
  display: flex; gap: 8px; justify-content: center; align-items: center;
  flex-wrap: wrap;
}
.cert-meta-dot { color: var(--gold); }

.cert-score-display {
  display: inline-flex;
  align-items: center; gap: 0;
  margin: 4px 0 8px;
  border: 1.5px solid var(--gold);
  overflow: hidden;
}

// ================================================================
const FIREBASE_URL = 'https://mikids-scores-default-rtdb.firebaseio.com';
// ឧទាហរណ៍: 'https://mikids-scores-default-rtdb.firebaseio.com'
// ================================================================

const DB_PATH = '/mikids-scores-v2.json';

async function fbGet() {
  try {
    const r = await fetch(FIREBASE_URL + DB_PATH, { method: 'GET', mode: 'cors', headers: { 'Accept': 'application/json' } });
    if (!r.ok) return null;
    const data = await r.json();
    return data || {};
  } catch(e) { return null; }
}

async function fbSet(data) {
  try {
    const r = await fetch(FIREBASE_URL + DB_PATH, {
      method: 'PUT', mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch(e) { return false; }
}

async function loadSharedScores() {
  // Try Firebase first
  const remote = await fbGet();
  if (remote && Object.keys(remote).length > 0) {
    // Cache locally
    try { localStorage.setItem('mikids-fb-cache', JSON.stringify(remote)); } catch(e) {}
    return remote;
  }
  // Fallback: localStorage cache (offline mode)
  try {
    const v = localStorage.getItem('mikids-fb-cache');
    if (v) return JSON.parse(v);
  } catch(e) {}
  return {};
}

async function persistScores() {
  const d = JSON.stringify(scores);
  if (d === lastSavedHash) return;
  lastSavedHash = d;
  // Save to Firebase (real-time sync across all devices)
  const ok = await fbSet(scores);
  // Also cache locally
  try { localStorage.setItem('mikids-fb-cache', d); } catch(e) {}
  return ok;
}

  {no:33, name:'អោក និស្សិត',               sex:'ប', grade:'ថ្នាក់ទី៣', code:'03.05', disp:'០៣.៥'},

  {no:35, name:'ចំរើន ម៉ានីតា',             sex:'ស', grade:'ថ្នាក់ទី៣', code:'03.07', disp:'០៣.៧'},
  {no:36, name:'កែវ វីនសុឧត្តតារា',          sex:'ស', grade:'ថ្នាក់ទី៣', code:'03.08', disp:'០៣.៨'},
  {no:37, name:'ឡាយ ភារ៉ាដាវីឌ',            sex:'ប', grade:'ថ្នាក់ទី៤', code:'04.01', disp:'០៤.១'},
  {no:38, name:'វង្ស មុនីកញ្ចនា',            sex:'ស', grade:'ថ្នាក់ទី៤', code:'04.05', disp:'០៤.៥'},
  {no:39, name:'ពៅ សុនីតា',                sex:'ស', grade:'ថ្នាក់ទី៥', code:'05.01', disp:'០៥.១'},
  {no:40, name:'ឡ សុវណ្ណហាន់ណា',            sex:'ស', grade:'ថ្នាក់ទី៥', code:'05.02', disp:'០៥.២'},
];

const CRITERIA = [
  {key:'c1', label:'ការណ្ណែន<br>ខំ',           max:1,   sub:'(1ពិន្ទុ)'},
  {key:'c2', label:'អានមិនខុស/<br>មិនរំលង',    max:3,   sub:'(3ពិន្ទុ)'},
  {key:'c3', label:'ការដាក់<br>សំឡេង/សំនៀង',   max:2.5, sub:'(2.5ពិន្ទុ)'},
  {key:'c4', label:'អានលឿន/<br>គោរពឃ្លា',      max:2,   sub:'(2ពិន្ទុ)'},
  {key:'c5', label:'យល់អត្ថបទ/<br>ឆ្លើយសំណួរ', max:1.5, sub:'(1.5ពិន្ទុ)'},
];

const GRADE_LIST = ['ថ្នាក់ទី១','ថ្នាក់ទី២','ថ្នាក់ទី៣','ថ្នាក់ទី៤','ថ្នាក់ទី៥'];
const KH_MONTHS  = ['មករា','កុម្ភៈ','មីនា','មេសា','ឧសភា','មិថុនា','កក្កដា','សីហា','កញ្ញា','តុលា','វិច្ឆិកា','ធ្នូ'];

let currentGrade = 'ទាំងអស់';
let currentJudge = '1';
let currentResGrade = 'all';
let scores = {};
let lastSavedHash = '';
let pollTimer = null;

window.onload = async () => {
  try { currentJudge = localStorage.getItem('mikids-my-judge') || '1'; } catch(e) {}
  document.getElementById('judgeSelect').value = currentJudge;

  if (FIREBASE_URL === 'YOUR_FIREBASE_URL_HERE') {
    showToast('⚠️ សូមដាក់ Firebase URL ក្នុង code!');
    document.getElementById('liveStatus').textContent = '⚠️ Firebase URL មិនទាន់ដាក់';
    document.getElementById('liveDot').style.background = '#e53e3e';
  }

  buildTabs();
  buildResGradeTabs();
  scores = await loadSharedScores() || {};
  lastSavedHash = JSON.stringify(scores);
  renderTable();
  updateSummary();
  updateLeaderboard();

  startPolling();
};

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (FIREBASE_URL === 'YOUR_FIREBASE_URL_HERE') return;
    try {
      const remote = await fbGet();
      if (!remote) return;
      const remoteStr = JSON.stringify(remote);
      if (remoteStr !== lastSavedHash) {
        scores = remote;
        lastSavedHash = remoteStr;
        try { localStorage.setItem('mikids-fb-cache', remoteStr); } catch(e) {}
        renderTable();
        updateSummary();
        updateLeaderboard();
        const dot = document.getElementById('liveDot');
        const st  = document.getElementById('liveStatus');
        if (dot) { dot.style.background = '#f6c23e'; }
        if (st)  { st.textContent = 'បានទទួល​ទិន្នន័យ​ថ្មី ✓'; }
        setTimeout(() => {
          if (dot) dot.style.background = '#38a169';
          if (st)  st.textContent = 'ចែករំលែក Real-time';
        }, 2000);
      }
    } catch(e) {}
  }, 4000);
}

function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.page-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');
  if (page === 'results') renderResults();
  if (page === 'cert')    renderCerts();
}

function switchJudge() {
  currentJudge = document.getElementById('judgeSelect').value;
  try { localStorage.setItem('mikids-my-judge', currentJudge); } catch(e) {}
  renderTable(); updateSummary(); updateLeaderboard();
  showToast('ឥឡូវ​អ្នក​ជា គណៈ​កម្ម​ការ​ទី ' + currentJudge);
}

function buildTabs() {
  const wrap = document.getElementById('classTabs');
  wrap.innerHTML = '';
  [...GRADE_LIST, 'ទាំងអស់'].forEach(g => {
    const b = document.createElement('button');
    b.className = 'class-tab' + (g === currentGrade ? ' active' : '');
    b.textContent = g;
    b.onclick = () => { currentGrade = g; buildTabs(); renderTable(); };
    wrap.appendChild(b);
  });
}

function renderTable() {
  const area = document.getElementById('tableArea');
  const filtered = currentGrade === 'ទាំងអស់' ? allStudents : allStudents.filter(s => s.grade === currentGrade);
  const groups = {};
  filtered.forEach(s => { if (!groups[s.grade]) groups[s.grade] = []; groups[s.grade].push(s); });
  area.innerHTML = '';
  Object.entries(groups).forEach(([g, sts]) => area.appendChild(makeTableCard(g, sts)));
}

function makeTableCard(grade, students) {
  const card = document.createElement('div');
  card.className = 'table-card';
  const done = students.filter(s => getTotal(s.code) > 0).length;
  card.innerHTML = `
    <div class="table-title">
      <span>📚 ${grade} — ${students.length} នាក់</span>
      <span style="font-size:13px;opacity:.85">បានបញ្ចូល: ${done}/${students.length}</span>
    </div>
    <div class="score-table-wrap">
      <table class="score-table">
        <thead><tr>
          <th rowspan="2" class="col-no">ល.រ</th>
          <th rowspan="2" class="col-name" style="text-align:left;padding-left:10px">គោត្តនាម និងនាម</th>
          <th rowspan="2" class="col-sex">ភេទ</th>
          <th rowspan="2" class="col-grade">ថ្នាក់</th>
          <th rowspan="2" class="col-code">លេខ<br>សម្គាល់</th>
          ${CRITERIA.map(c=>`<th>${c.label}<br><span style="font-size:10px;opacity:.9">${c.sub}</span></th>`).join('')}
          <th rowspan="2" style="min-width:50px;background:#0f2547">សរុប<br>(10)</th>
        </tr></thead>
        <tbody>${students.map(s => makeRow(s)).join('')}</tbody>
      </table>
    </div>
    <div class="action-bar">
      <button class="btn btn-clear" onclick="clearGrade('${grade}')">🗑️ លុប ${grade}</button>
    </div>`;
  return card;
}

function sid(code) { return 'tot_' + code.replace(/\./g,'_'); }

function makeRow(s) {
  const sc = scores[s.code] || {};
  const total = getTotal(s.code);
  const tc = total===0?'empty':total>=8.5?'good':total>=7?'avg':'low';
  const td = total===0 ? '—' : total.toFixed(2);
  const inputs = CRITERIA.map(c => {
    const v = sc[c.key] !== undefined && sc[c.key] !== '' ? sc[c.key] : '';
    const cl = v==='' ? '' : parseFloat(v)>c.max ? ' over' : ' filled';
    return `<td><input class="score-input${cl}" type="number" min="0" max="${c.max}" step="0.5"
      value="${v}" data-code="${s.code}" data-key="${c.key}" data-max="${c.max}"
      oninput="onInput(this)" onfocus="this.select()"></td>`;
  }).join('');
  return `<tr>
    <td class="col-no">${s.no}</td>
    <td class="col-name">${s.name}</td>
    <td class="col-sex">${s.sex}</td>
    <td class="col-grade" style="font-size:11px">${s.grade}</td>
    <td class="col-code">${s.disp}</td>
    ${inputs}
    <td class="total-cell ${tc}" id="${sid(s.code)}">${td}</td>
  </tr>`;
}

function onInput(el) {
  const code = el.dataset.code, key = el.dataset.key, max = parseFloat(el.dataset.max);
  const raw = el.value.trim();
  el.classList.remove('over','filled');
  if (raw !== '' && !isNaN(+raw)) el.classList.add(+raw > max ? 'over' : 'filled');
  if (!scores[code]) scores[code] = {};
  scores[code][key] = raw==='' || isNaN(+raw) ? '' : +raw;
  refreshTotal(code);
  clearTimeout(window._st);
  window._st = setTimeout(() => { saveAllScores(); updateSummary(); updateLeaderboard(); }, 700);
}

function refreshTotal(code) {
  const t = getTotal(code);
  const el = document.getElementById(sid(code));
  if (!el) return;
  el.textContent = t===0 ? '—' : t.toFixed(2);
  el.className = 'total-cell ' + (t===0?'empty':t>=8.5?'good':t>=7?'avg':'low');
}

function getTotal(code, sc_) {
  const sc = sc_ || scores[code];
  if (!sc) return 0;
  let sum=0, any=false;
  CRITERIA.forEach(c => {
    const v = sc[c.key];
    if (v!==''&&v!==undefined&&!isNaN(+v)) { sum += Math.min(+v,c.max); any=true; }
  });
  return any ? Math.round(sum*100)/100 : 0;
}

async function saveAllScores() {
  const ok = await persistScores();
  const dot=document.getElementById('saveDot'), st=document.getElementById('saveStatus');
  dot.className='save-dot saved';
  st.textContent = ok ? 'Firebase ✓ រក្សា​ទុក​ហើយ' : 'Local cache ✓';
  setTimeout(()=>{ dot.className='save-dot'; st.textContent='រក្សា​ទុក​ស្វ័យ​ប្រវត្តិ'; },3000);
}

async function clearGrade(grade) {
  if (!confirm('លុបពិន្ទុ ' + grade + '?')) return;
  allStudents.filter(s=>s.grade===grade).forEach(s=>delete scores[s.code]);
  await saveAllScores(); renderTable(); updateSummary(); updateLeaderboard();
  showToast('បានលុបពិន្ទុ ' + grade);
}

function updateSummary() {
  const g = document.getElementById('summaryGrid');
  const ent = allStudents.filter(s=>getTotal(s.code)>0);
  const tots = ent.map(s=>getTotal(s.code));
  const avg = tots.length ? (tots.reduce((a,b)=>a+b,0)/tots.length).toFixed(1) : '—';
  const mx  = tots.length ? Math.max(...tots).toFixed(1) : '—';
  const pf  = tots.filter(t=>t===10).length;
  g.innerHTML = `
    <div class="summary-box"><div class="s-label">សិស្សចូលប្រកួត</div><div class="s-val">${allStudents.length}</div></div>
    <div class="summary-box"><div class="s-label">បានបញ្ចូលពិន្ទុ</div><div class="s-val">${ent.length}</div></div>
    <div class="summary-box"><div class="s-label">មធ្យមភាគ</div><div class="s-val">${avg}</div></div>
    <div class="summary-box"><div class="s-label">ពិន្ទុខ្ពស់បំផុត</div><div class="s-val">${mx}</div></div>
    <div class="summary-box"><div class="s-label">ពិន្ទុ ១០/១០</div><div class="s-val">${pf}</div></div>`;
}

function updateLeaderboard() {
  const lb = document.getElementById('lbContent');
  const ranked = allStudents
    .map(s => ({...s, total: getTotal(s.code)}))
    .filter(s => s.total > 0)
    .sort((a,b) => b.total - a.total).slice(0,10);
  if (!ranked.length) { lb.innerHTML='<p style="color:#999;font-size:13px">មិនទាន់មានពិន្ទុ</p>'; return; }
  const medals = ['🥇','🥈','🥉'];
  lb.innerHTML = ranked.map((s,i) => `
    <div class="lb-row">
      <span class="lb-rank">${medals[i]||(i+1)}</span>
      <div>
        <div class="lb-name">${s.name}</div>
        <div class="lb-class">${s.grade} · ${s.disp}</div>
      </div>
      <span class="lb-score">${s.total.toFixed(1)}</span>
    </div>`).join('');
}

function buildResGradeTabs() {
  const wrap = document.getElementById('resGradeTabs');
  wrap.innerHTML = '';
  const tabs = [{val:'all', label:'ទាំងអស់'}, ...GRADE_LIST.map(g=>({val:g, label:g}))];
  tabs.forEach(t => {
    const b = document.createElement('button');
    b.className = 'res-grade-tab' + (t.val === currentResGrade ? ' active' : '');
    b.textContent = t.label;
    b.onclick = () => { currentResGrade = t.val; buildResGradeTabs(); renderResults(); };
    wrap.appendChild(b);
  });
}

async function renderResults() {
  buildResGradeTabs();
  const jScores = scores;

  let students = currentResGrade === 'all'
    ? [...allStudents]
    : allStudents.filter(s => s.grade === currentResGrade);

  let rows = students.map(s => ({
    ...s,
    total: getTotal(s.code, jScores[s.code] || {})
  }));

  rows.sort((a,b) => b.total - a.total);
  let rc = 1;
  rows.forEach((r,i) => {
    if (i > 0 && r.total < rows[i-1].total) rc = i+1;
    r.rank = r.total > 0 ? rc : 0;
  });

  const total_n = rows.length;
  const male_n  = rows.filter(r=>r.sex==='ប').length;
  const fem_n   = rows.filter(r=>r.sex==='ស').length;
  const entered = rows.filter(r=>r.total>0);
  const exc_n   = entered.filter(r=>r.total>=8.5).length;
  const exc_m   = entered.filter(r=>r.total>=8.5&&r.sex==='ប').length;
  const exc_f   = entered.filter(r=>r.total>=8.5&&r.sex==='ស').length;
  const fail_n  = entered.filter(r=>r.total<5).length;
  const fail_m  = entered.filter(r=>r.total<5&&r.sex==='ប').length;
  const fail_f  = entered.filter(r=>r.total<5&&r.sex==='ស').length;
  const tots    = entered.map(r=>r.total);
  const avg_all = tots.length ? (tots.reduce((a,b)=>a+b,0)/tots.length).toFixed(2) : '—';
  const exc_pct = total_n>0?((exc_n/total_n)*100).toFixed(1):'0.0';
  const fail_pct= total_n>0?((fail_n/total_n)*100).toFixed(1):'0.0';

  const now = new Date();
  const dateStr = `ភ្នំពេញ, ថ្ងៃទី ${now.getDate()} ខែ${KH_MONTHS[now.getMonth()]} ឆ្នាំ ${now.getFullYear()}`;
  const gradeLabel = currentResGrade === 'all' ? 'ថ្នាក់ទាំងអស់' : currentResGrade;

  rows.sort((a,b) => a.no - b.no);

  const tableRows = rows.map((r,i) => {
    const t = r.total;
    let badge='', bClass='';
    if (t===0)        { badge='មិនបញ្ចូល'; bClass='nit-none'; }
    else if (t>=8.5)  { badge='ល្អណាស់';   bClass='nit-excellent'; }
    else if (t>=7)    { badge='ល្អ';        bClass='nit-good'; }
    else if (t>=5)    { badge='មធ្យម';      bClass='nit-average'; }
    else              { badge='ខ្សោយ';      bClass='nit-fail'; }

    let rankHtml = '<span class="rank-none">—</span>';
    if (r.rank > 0) {
      const rc2 = r.rank===1?'rank-1':r.rank===2?'rank-2':r.rank===3?'rank-3':'rank-n';
      rankHtml = `<span class="rank-circle ${rc2}">${r.rank}</span>`;
    }

    const sc = jScores[r.code] || {};
    const cVals = CRITERIA.map(c => {
      const v = sc[c.key];
      return (v!==undefined&&v!==''&&!isNaN(+v)) ? (+v).toFixed(1) : '—';
    }).join('</td><td style="font-size:12px">');

    return `<tr>
      <td>${i+1}</td>
      <td style="font-size:12px">${r.disp}</td>
      <td class="name-col">${r.name}</td>
      <td>${r.sex}</td>
      <td style="font-size:12px">${cVals}</td>
      <td style="font-weight:bold;font-size:14px;color:#1a3a6b">${t>0?t.toFixed(2):'0.00'}</td>
      <td>${t>0?t.toFixed(2):'0.00'}</td>
      <td>${rankHtml}</td>
      <td><span class="nittoes ${bClass}">${badge}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('reportArea').innerHTML = `
  <div class="report-wrap">
    <div class="rpt-top">
      <div class="rpt-logo-box">
        <img class="rpt-logo-circle" src="https://i.ibb.co/RTWkghgd/Logo-Mikid-removebg-preview.png" alt="MIKIDS" onerror="this.style.display='none'">
        <div class="rpt-school">
          <div class="km">សាលាអន្តរជាតិម៉ាយឃីដ</div>
          <div class="en">MIKIDS INTERNATIONAL SCHOOL</div>
        </div>
      </div>
      <div class="rpt-right">
        <p>ព្រះរាជាណាចក្រកម្ពុជា</p>
        <p>ជាតិ សាសនា ព្រះមហាក្សត្រ</p>
        <p class="stars">✦ ✦ ✦</p>
      </div>
    </div>
    <div class="rpt-title-box">
      <h2>តារាងបូកសរុបពិន្ទុប្រកួតអំណាន "ភាសាខ្មែរ"</h2>
      <p>${gradeLabel} — វគ្គផ្តាច់ព្រ័ត្រ ឆ្នាំ ២០២៥-២០២៦ &nbsp;|&nbsp; គណៈ​កម្ម​ការ​ទាំង ៥</p>
    </div>
    <div class="rpt-stats">
      សិស្សសរុប <strong>${total_n}</strong> នាក់ (ប្រុស ${male_n}, ស្រី ${fem_n}) &nbsp;|&nbsp;
      មធ្យមភាគ <strong>${avg_all}</strong> &nbsp;|&nbsp;
      ល្អណាស់: <strong>${exc_n}</strong> នាក់ (ប ${exc_m}/ស ${exc_f}) = ${exc_pct}% &nbsp;|&nbsp;
      ខ្សោយ: <strong>${fail_n}</strong> នាក់ (ប ${fail_m}/ស ${fail_f}) = ${fail_pct}%
    </div>
    <table class="rpt-table">
      <thead>
        <tr>
          <th rowspan="2" style="width:30px">ល.រ</th>
          <th rowspan="2" style="width:54px">អត្តលេខ</th>
          <th rowspan="2" style="text-align:left;padding-left:8px">គោត្តនាម-នាម</th>
          <th rowspan="2" style="width:32px">ភេទ</th>
          <th colspan="5" style="background:#2a5298;font-size:11px">លម្អិតពិន្ទុ</th>
          <th rowspan="2" style="width:54px">ពិន្ទុសរុប</th>
          <th rowspan="2" style="width:54px">មធ្យមភាគ</th>
          <th rowspan="2" style="width:48px">ចំណាត់ថ្នាក់</th>
          <th rowspan="2" style="width:72px">និទ្ទេស</th>
        </tr>
        <tr>
          ${CRITERIA.map(c=>`<th style="background:#2a5298;font-size:10px">${c.label.replace('<br>',' ')}<br>${c.sub}</th>`).join('')}
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="rpt-footer">
      <div class="rpt-legend">
        <span>■ ល្អណាស់ ≥ ៨.៥</span>
        <span>■ ល្អ ៧–៨.៤</span>
        <span>■ មធ្យម ៥–៦.៩</span>
        <span>■ ខ្សោយ &lt;៥</span>
      </div>
      <div class="rpt-sigs">
        <div class="sig-block"><div>ចារផ្ទាំង និងអ​ធិការ</div><div class="sub">ពោធ​បាន​សោភ​ណ</div></div>
        <div class="sig-block"><div>${dateStr}</div><div style="margin-top:5px">អ្នកគ្រប់គ្រងថ្នាក់</div></div>
      </div>
    </div>
  </div>`;
}

function getNittoes(t) {
  if (t<=0)   return {label:'—',         bg:'#eee',     color:'#888'};
  if (t>=8.5) return {label:'ល្អណាស់',  bg:'#c6f6d5',  color:'#22543d'};
  if (t>=7)   return {label:'ល្អ',       bg:'#bee3f8',  color:'#2a4e7a'};
  if (t>=5)   return {label:'មធ្យម',     bg:'#fefcbf',  color:'#7b4f12'};
  return             {label:'ខ្សោយ',    bg:'#fed7d7',  color:'#822727'};
}

const RANK_INFO = [
  {medal:'🥇', km:'ទី​មួយ',   en:'1st Place'},
  {medal:'🥈', km:'ទី​ពីរ',   en:'2nd Place'},
  {medal:'🥉', km:'ទី​បី',    en:'3rd Place'},
  {medal:'🎗️', km:'ទី​បួន',   en:'4th Place'},
  {medal:'🎖️', km:'ទី​ប្រាំ',  en:'5th Place'},
];

async function renderCerts() {
  const gradeVal = document.getElementById('cGrade').value;
  const jScores  = scores;
  const judgeLabel = 'គណៈ​កម្ម​ការ​ទាំង ៥';
  const area = document.getElementById('certArea');
  const now = new Date();
  const dateStr = `${now.getDate()} ខែ${KH_MONTHS[now.getMonth()]} ឆ្នាំ ${now.getFullYear()}`;

  let html = '';
  if (gradeVal === 'all') {
    GRADE_LIST.forEach(grade => {
      const students = allStudents.filter(s => s.grade === grade);
      const rows = students
        .map(s => ({...s, total: getTotal(s.code, jScores[s.code]||{})}))
        .filter(r => r.total > 0)
        .sort((a,b) => b.total - a.total)
        .slice(0, 5);
      if (rows.length) {
        html += `<div style="margin-bottom:8px;font-size:15px;font-weight:bold;color:#1a3a6b;border-left:4px solid #f6c23e;padding-left:10px">${grade}</div>`;
        html += '<div class="cert-grid">' + rows.map((r,i) => makeCert(r, i+1, judgeLabel, dateStr)).join('') + '</div>';
      }
    });
  } else {
    const students = allStudents.filter(s => s.grade === gradeVal);
    const rows = students
      .map(s => ({...s, total: getTotal(s.code, jScores[s.code]||{})}))
      .filter(r => r.total > 0)
      .sort((a,b) => b.total - a.total)
      .slice(0, 5);
    if (rows.length) {
      html += '<div class="cert-grid">' + rows.map((r,i) => makeCert(r, i+1, judgeLabel, dateStr)).join('') + '</div>';
    }
  }

  if (!html) {
    area.innerHTML = '<div style="text-align:center;padding:50px;color:#999;font-size:15px">មិនទាន់មានទិន្នន័យ — សូមបញ្ចូលពិន្ទុជាមុន</div>';
    return;
  }
  area.innerHTML = `<div class="cert-area-wrap">${html}</div>`;
}

function makeCert(r, rank, judgeVal, dateStr) {
  const nit = getNittoes(r.total);
  const ri  = RANK_INFO[rank-1] || {medal:'🎗️', km:`ទី ${rank}`, en:`Rank ${rank}`};
  const rankClass = `cert-rank-${rank <= 5 ? rank : 'n'}`;
  const rankKmFull = ['ទី​មួយ','ទី​ពីរ','ទី​បី','ទី​បួន','ទី​ប្រាំ'][rank-1] || `ទី ${rank}`;
  const medals = ['🥇','🥈','🥉','🏅','🎖️'];
  const medal = medals[rank-1] || '🎗️';

  return `
  <div class="certificate ${rankClass}">
    <div class="cert-border-outer"></div>
    <div class="cert-border-inner"></div>
    <div class="cert-ribbon">
      <div class="cert-ribbon-top-stripe"></div>
      <div class="cert-ribbon-content">
        <img class="cert-ribbon-logo"
          src="https://i.ibb.co/RTWkghgd/Logo-Mikid-removebg-preview.png"
          alt="MIKIDS" onerror="this.style.display='none'">
        <div class="cert-ribbon-text">
          <div class="cert-ribbon-km">សាលាអន្តរជាតិម៉ាយឃីដ</div>
          <div class="cert-ribbon-en">Mikids International School</div>
        </div>
      </div>
      <div class="cert-ribbon-bottom"></div>
    </div>
    <div class="cert-medal-badge">
      <div class="cert-medal-ribbon-bar"></div>
      <div class="cert-medal-circle">${medal}</div>
    </div>
    <div class="cert-body">
      <div class="cert-seal"></div>
      <div class="cert-rank-label">${rankKmFull} · ${ri.en}</div>
      <div class="cert-title-km">បត្រ​សរ​សើរ</div>
      <div class="cert-title-en">Certificate of Achievement</div>
      <div class="cert-ornament">
        <div class="cert-ornament-line"></div>
        <span class="cert-ornament-gem">✦</span>
        <div class="cert-ornament-line r"></div>
      </div>
      <span class="cert-event-tag">ប្រកួត​អំណាន "ភាសាខ្មែរ" &nbsp;—&nbsp; ២០២៥–២០២៦</span>
      <div class="cert-presents">សំ​ដែង​នូវ​ការ​សរ​សើរ​ដ៏​ខ្ពង់​ខ្ពស់​ចំ​ពោះ</div>
      <div class="cert-name">${r.name}</div>
      <div class="cert-name-underline"></div>
      <div class="cert-meta">
        <span>${r.grade}</span>
        <span class="cert-meta-dot">◆</span>
        <span>លេខ ${r.disp}</span>
        <span class="cert-meta-dot">◆</span>
        <span>${r.sex === 'ប' ? 'ប្រុស' : 'ស្រី'}</span>
        <span class="cert-meta-dot">◆</span>
        <span>${judgeVal}</span>
      </div>
      <div>
        <div class="cert-score-display">
          <div class="cert-score-label">ពិន្ទុ​សរុប</div>
          <div class="cert-score-value">
            ${r.total.toFixed(2)}
            <span class="cert-score-slash">/</span>
            <span class="cert-score-max">១០</span>
          </div>
        </div>
      </div>
      <div>
        <span class="cert-nit-badge" style="background:${nit.bg};color:${nit.color}">${nit.label}</span>
      </div>
      <div class="cert-footer-divider"></div>
      <div class="cert-footer">
        <div class="cert-sig">
          <div class="cert-sig-line"></div>
          <div class="cert-sig-name">ចារ​ផ្ទាំង</div>
          <div class="cert-sig-sub">ពោធ​បាន​សោភ​ណ</div>
        </div>
        <div class="cert-footer-date">ភ្នំ​ពេញ<br>ថ្ងៃ​ទី ${dateStr}</div>
        <div class="cert-sig">
          <div class="cert-sig-line"></div>
          <div class="cert-sig-name">នាយក​សាលា</div>
          <div class="cert-sig-sub">MIKIDS</div>
        </div>
      </div>
    </div>
  </div>`;
}

function doPrint() { window.print(); }

function buildPrintPage(contentHTML, title) {
  const styles = Array.from(document.querySelectorAll('style')).map(s => s.outerHTML).join('\n');
  const links  = Array.from(document.querySelectorAll('link[rel="stylesheet"]')).map(l => l.outerHTML).join('\n');
  const autoprint = '<img src=x onerror="setTimeout(function(){window.print();},800)">';
  return '<!DOCTYPE html><html lang="km"><head><meta charset="UTF-8"><title>' + title + '</title>'
    + links + styles
    + '<style>body{background:white!important;margin:0;padding:0;}'
    + '@page{margin:10mm;size:A4 portrait;}'
    + '*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}'
    + '</st'+'yle></he'+'ad><bo'+'dy>'
    + contentHTML + autoprint
    + '</bo'+'dy></ht'+'ml>';
}

function downloadResultsPDF() {
  const content = document.getElementById('reportArea').innerHTML;
  if (!content || content.trim() === '') { showToast('មិនទាន់មានទិន្នន័យ'); return; }
  const gradeLabel = document.querySelector('#resGradeTabs button.active')?.textContent || 'ទាំងអស់';
  const title = `MIKIDS_លទ្ធផល_${gradeLabel}`;
  const win = window.open('', '_blank', 'width=900,height=700');
  if (!win) { showToast('សូម​អនុញ្ញាត pop-up'); return; }
  win.document.write(buildPrintPage(`<div style="font-family:'Noto Serif Khmer',serif;">${content}</div>`, title));
  win.document.close();
}

function downloadCertPDF() {
  const content = document.getElementById('certArea').innerHTML;
  if (!content || content.trim() === '') { showToast('មិនទាន់មានទិន្នន័យ'); return; }
  const gradeVal = document.getElementById('cGrade').value;
  const title = `MIKIDS_បត្រសរសើរ_${gradeVal === 'all' ? 'ទាំងអស់' : gradeVal}`;
  const win = window.open('', '_blank', 'width=900,height=700');
  if (!win) { showToast('សូម​អនុញ្ញាត pop-up'); return; }
  win.document.write(buildPrintPage(content, title));
  win.document.close();
}

function exportCSV() {
  const headers = ['ល.រ','គោត្តនាម','ភេទ','ថ្នាក់','លេខ',
    'ការណ្ណែន(1)','អានមិនខុស(3)','ការដាក់សំឡេង(2.5)','អានលឿន(2)','យល់(1.5)','សរុប(10)'];
  const rows = allStudents.map(s => {
    const sc = scores[s.code]||{};
    const vals = CRITERIA.map(c=>(sc[c.key]!==undefined&&sc[c.key]!=='')?sc[c.key]:'');
    return [s.no,`"${s.name}"`,s.sex,s.grade,s.disp,...vals,getTotal(s.code)||''].join(',');
  });
  const blob = new Blob(['\ufeff'+[headers.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `MIKIDS_scores.csv`;
  a.click();
  showToast('Export CSV ជោគជ័យ!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
